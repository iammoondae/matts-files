name: Build and Package APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Database Quality Check Gate
      run: |
        python3 scratch/validate_db.py

    - name: Prepare Web Assets for Build
      run: |
        ASSETS_DIR="android-project/app/src/main/assets"
        rm -rf "$ASSETS_DIR"
        mkdir -p "$ASSETS_DIR"
        
        # Determine build metadata
        BUILD_VERSION="v${{ github.run_number }}"
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          BUILD_VERSION="${{ github.ref_name }}"
        fi
        BUILD_DATE_FULL=$(date +"%B %d, %Y")
        
        echo "Building Version: $BUILD_VERSION"
        echo "Build Date: $BUILD_DATE_FULL"
        
        # Copy web assets
        cp index.html "$ASSETS_DIR/"
        cp index.css "$ASSETS_DIR/"
        cp app.js "$ASSETS_DIR/"
        cp icon.png "$ASSETS_DIR/"
        cp grade_3_matatag_hub.html "$ASSETS_DIR/"
        cp correct.wav "$ASSETS_DIR/"
        cp incorrect.wav "$ASSETS_DIR/"
        cp background5.mp3 "$ASSETS_DIR/"
        
        cp -r data "$ASSETS_DIR/"
        cp -r images "$ASSETS_DIR/"
        cp -r Worksheets "$ASSETS_DIR/"
        
        # Inject build metadata
        sed -i "s/__APP_BUILD_VERSION__/${BUILD_VERSION}/g" "$ASSETS_DIR/app.js"
        sed -i "s/__APP_BUILD_DATE__/${BUILD_DATE_FULL}/g" "$ASSETS_DIR/app.js"
        sed -i "s/versionName \".*\"/versionName \"${BUILD_VERSION}\"/g" android-project/app/build.gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Android Debug APK
      run: |
        cd android-project
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: matteos-learning-hub-debug-apk
        path: android-project/app/build/outputs/apk/debug/app-debug.apk
