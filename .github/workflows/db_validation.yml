name: Database Quality Check Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-style: '3.10'

    - name: Run Quality Gate Checks
      run: |
        python3 scratch/validate_db.py
